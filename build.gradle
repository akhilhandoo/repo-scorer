plugins {
    id 'java'
    id("io.freefair.lombok") version "9.5.0"
    id 'org.springframework.boot' version '4.1.0'
}

group = 'com.reposcorer'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

jar {
    manifest {
        attributes(
                'Main-Class': 'com.reposcorer.RepoScorerApplication'
        )
    }
}

dependencies {
    implementation("org.springframework.boot:spring-boot-starter-web:4.1.0")
    implementation("org.mapstruct:mapstruct:1.6.3")
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation("org.junit.platform:junit-platform-launcher:6.1.0")
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation("org.springframework.boot:spring-boot-starter-test:4.1.0")
    implementation("org.springframework.boot:spring-boot-test-autoconfigure:4.1.0")
}

test {
    useJUnitPlatform()
}